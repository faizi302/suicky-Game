<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Squicky</title>
    <link rel="shortcut icon" href="assets/faizi assets/favicon.ico" type="image/x-icon">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
            background: #1a0a00;
            touch-action: none;
        }

        body {
            position: relative;
        }

        /* FULLSCREEN ROOT */
        #game-root {
            position: fixed;
            inset: 0;
            overflow: visible !important;
            background: #1a0a00;
        }

        /* CANVAS */
        #gameCanvas {
            display: block;
            position: absolute;
            inset: 0;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            touch-action: none;
            z-index: 1;
        }

        /* All preloaded asset images stay hidden —
           EXCEPT the three mobile control images (pad bg, stick, jump button) */
        img:not(#pad-bg-el):not(#pad-stick-el):not(#jump-btn-el),
        audio {
            display: none;
        }

        /* ROTATE OVERLAY */
        #rotate-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: #1a0a00;
            z-index: 9999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        #rotate-overlay.visible {
            display: flex;
        }

        #rotate-overlay .rot-icon {
            font-size: 64px;
            animation: rotHint 1.8s ease-in-out infinite;
            display: inline-block;
        }

        #rotate-overlay p {
            color: #f5c068;
            font-family: Arial, sans-serif;
            font-size: clamp(15px, 4vw, 22px);
            text-align: center;
            line-height: 1.5;
            padding: 0 20px;
        }

        @keyframes rotHint {

            0%,
            100% {
                transform: rotate(0deg);
            }

            40%,
            60% {
                transform: rotate(-90deg);
            }
        }

        #mobile-pad-wrap,
        #mobile-jump-wrap {
            display: none;
            position: fixed !important;
            touch-action: none;
            pointer-events: auto;
            visibility: visible;
            opacity: 1;
            z-index: 2147483647 !important;
        }

        #mobile-pad-wrap {
            left: 0;
            bottom: 0;
            width: 160px;
            height: 160px;
        }

        #mobile-jump-wrap {
            right: 0;
            bottom: 0;
            width: 120px;
            height: 120px;
        }

        #mobile-pad-wrap.show,
        #mobile-jump-wrap.show {
            display: block !important;
        }

        #pad-bg-el,
        #pad-stick-el,
        #jump-btn-el {
            display: block !important;
            visibility: visible !important;
            opacity: 1 !important;
        }

        #pad-bg-el {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            pointer-events: none;
        }

        #pad-stick-el {
            position: absolute;
            width: 44%;
            height: 44%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            object-fit: contain;
            pointer-events: none;
            transition: transform 0.04s linear;
        }

        #jump-btn-el {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            pointer-events: none;
            transition: transform 0.06s ease, filter 0.06s ease;
        }

        #mobile-jump-wrap.pressed #jump-btn-el {
            filter: brightness(1.4) saturate(1.3);
            transform: scale(0.90);
        }

        /* Strong fullscreen enforcement — wrappers AND their images */
        #game-root:fullscreen #mobile-pad-wrap,
        #game-root:fullscreen #mobile-jump-wrap,
        #game-root:-webkit-full-screen #mobile-pad-wrap,
        #game-root:-webkit-full-screen #mobile-jump-wrap {
            display: block !important;
            visibility: visible !important;
            opacity: 1 !important;
            z-index: 2147483647 !important;
        }

        /* Explicitly force control images visible in fullscreen —
           mobile browser UA stylesheets can reset img display inside fullscreen context */
        #game-root:fullscreen #pad-bg-el,
        #game-root:fullscreen #pad-stick-el,
        #game-root:fullscreen #jump-btn-el,
        #game-root:-webkit-full-screen #pad-bg-el,
        #game-root:-webkit-full-screen #pad-stick-el,
        #game-root:-webkit-full-screen #jump-btn-el {
            display: block !important;
            visibility: visible !important;
            opacity: 1 !important;
        }
    </style>
</head>
